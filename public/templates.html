<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Templates — Assinaturas de E-mail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <p class="eyebrow">Assinaturas corporativas</p>
        <h1>
          Templates
          <svg class="sig-mark" width="72" height="20" viewBox="0 0 140 32" fill="none" aria-hidden="true">
            <path d="M2 24 C 20 4, 30 4, 42 18 S 66 32, 78 14 S 100 2, 112 16 S 130 26, 138 10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </h1>
        <p class="subtitle">Envie e gerencie os templates reutilizados na geração de assinaturas</p>
      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema claro/escuro">
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M20 14.5A8.5 8.5 0 0 1 9.5 4 8.5 8.5 0 1 0 20 14.5Z" fill="currentColor"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="4.5" fill="currentColor"/><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/><line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/><line x1="4.2" y1="4.2" x2="6" y2="6"/><line x1="18" y1="18" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="6" y2="18"/><line x1="18" y1="6" x2="19.8" y2="4.2"/></g></svg>
      </button>
    </div>
    <nav class="nav"><a href="index.html">Gerar assinaturas</a> · <a href="templates.html" class="active">Templates</a></nav>
  </header>

  <main>
    <section class="step">
      <h2>Novo template</h2>
      <p>Arquivo <code>.mjml</code>, <code>.html</code> ou <code>.docx</code> (Word) com campos
        <code>{{nome}}</code>, <code>{{cargo}}</code>, etc.</p>
      <input type="file" id="tpl-file" accept=".mjml,.html,.htm,.docx" />
      <div class="field">
        <label>Nome: <input type="text" id="tpl-name" placeholder="ex.: assinatura-vendas" /></label>
      </div>
      <div class="result" id="overwrite-warn"></div>
      <button id="btn-upload">Salvar template</button>
    </section>

    <section class="step">
      <h2>Salvos</h2>
      <div class="template-list" id="template-list"></div>
    </section>
  </main>

  <div class="toast" id="toast" hidden></div>

  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/templates-page.js"></script>
</body>
</html>
